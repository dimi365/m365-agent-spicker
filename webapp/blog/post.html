<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dimi365 · Blog Post</title>
  <style>
    :root { --bg:#f5f4f2; --surface:#fff; --ink:#242424; --ink-soft:#616161; --stroke:#e3e1de; --brand:#742774; --copilot:#0f6cbd; --radius:8px; --shadow:0 1.6px 3.6px rgba(0,0,0,.08),0 0.3px 0.9px rgba(0,0,0,.06);} 
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI Variable Text","Segoe UI",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.65}
    .topbar{background:linear-gradient(90deg,#3b1a53 0%,#5b2160 55%,#742774 100%);color:#fff;height:48px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
    .shell{max-width:900px;margin:0 auto;padding:28px 16px 56px}
    .card{background:var(--surface);border:1px solid var(--stroke);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px}
    .meta{color:var(--ink-soft);font-size:13px;margin-top:8px}
    .content{margin-top:18px}
    .content h1,.content h2,.content h3{line-height:1.25;margin:1.2em 0 .45em}
    .content p{margin:.7em 0}
    .content ul,.content ol{margin:.7em 0 .7em 1.2em}
    .content code{background:#f0eeea;padding:.1em .3em;border-radius:4px}
    .content pre{background:#1f1f1f;color:#f1f1f1;padding:12px;border-radius:8px;overflow:auto}
    .back{display:inline-block;margin-bottom:14px;color:var(--copilot);font-weight:600;text-decoration:none}
    .error{color:#b3261e}
  </style>
</head>
<body>
  <header class="topbar">
    <strong>Dimi365 · Blog</strong>
    <nav><a href="index.html" style="color:#fff;text-decoration:none">Zur Uebersicht</a></nav>
  </header>

  <main class="shell">
    <a class="back" href="index.html">← Zurueck zu allen Beitraegen</a>
    <article class="card">
      <h1 id="title">Lade Beitrag...</h1>
      <p id="meta" class="meta"></p>
      <div id="content" class="content"></div>
    </article>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="../assets/js/blog-data.js"></script>
  <script>
    (async function () {
      var params = new URLSearchParams(window.location.search);
      var slug = params.get('slug');
      var titleEl = document.getElementById('title');
      var metaEl = document.getElementById('meta');
      var contentEl = document.getElementById('content');

      if (!slug) {
        titleEl.textContent = 'Kein Beitrag ausgewaehlt';
        contentEl.innerHTML = '<p class="error">Bitte einen gueltigen Post ueber die Blog-Uebersicht oeffnen.</p>';
        return;
      }

      try {
        var post = await window.BlogData.fetchPostBySlug(slug);
        if (!post) {
          titleEl.textContent = 'Beitrag nicht gefunden';
          contentEl.innerHTML = '<p class="error">Dieser Beitrag existiert nicht oder wurde verschoben.</p>';
          return;
        }

        titleEl.textContent = post.title;
        metaEl.textContent = (post.date ? post.date + ' · ' : '') + post.tag;

        marked.setOptions({ gfm: true, breaks: false });
        var html = marked.parse(post.markdown || '');
        var safe = DOMPurify.sanitize(html, {
          USE_PROFILES: { html: true },
          ADD_ATTR: ['target', 'rel']
        });
        contentEl.innerHTML = safe;
      } catch (err) {
        titleEl.textContent = 'Fehler beim Laden';
        contentEl.innerHTML = '<p class="error">' + window.BlogData.escapeHtml(err.message) + '</p>';
      }
    })();
  </script>
</body>
</html>
